<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SynkBot - Asistente virtual de SynkData. Código a Medida. Inteligencia en cada Dato." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>SynkBot - Asistente de SynkData</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --synk-dark: #0a0a0f;
      --synk-gray: #1a1a2e;
      --synk-green: #00ff88;
      --synk-cyan: #00d4ff;
      --synk-purple: #8b5cf6;
      --white-90: rgba(255,255,255,0.9);
      --white-50: rgba(255,255,255,0.5);
      --white-10: rgba(255,255,255,0.1);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--synk-dark) 0%, var(--synk-gray) 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      width: 100%;
      padding: 1.5rem 1rem;
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--white-10);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--synk-green), var(--synk-cyan));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      fill: var(--synk-dark);
    }

    .logo-text h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .logo-text p {
      font-size: 0.875rem;
      color: var(--synk-green);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--white-10);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--synk-green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 0.875rem;
      color: var(--white-50);
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem 6rem;
    }

    .chat-container {
      width: 100%;
      max-width: 800px;
      height: calc(100vh - 180px);
      max-height: 700px;
      background: rgba(10,10,15,0.6);
      backdrop-filter: blur(20px);
      border: 1px solid var(--white-10);
      border-radius: 1.5rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      max-width: 80%;
      padding: 1rem 1.25rem;
      border-radius: 1rem;
      animation: fadeIn 0.3s ease-out;
      line-height: 1.6;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--white-10);
      border: 1px solid var(--white-10);
      border-bottom-left-radius: 0.25rem;
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--synk-green), var(--synk-cyan));
      color: var(--synk-dark);
      border-bottom-right-radius: 0.25rem;
    }

    .message-text {
      font-size: 0.9375rem;
    }

    .message-text strong {
      color: var(--synk-cyan);
    }

    .message.user .message-text strong {
      color: var(--synk-dark);
    }

    .message-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--white-50);
    }

    .message.user .message-meta {
      justify-content: flex-end;
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: var(--white-10);
      border-radius: 0.75rem;
      width: fit-content;
    }

    .typing-dots {
      display: flex;
      gap: 0.25rem;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--synk-green);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    .typing-text {
      font-size: 0.875rem;
      color: var(--synk-green);
    }

    .sources {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--white-10);
    }

    .sources-label {
      font-size: 0.75rem;
      color: var(--white-50);
      margin-bottom: 0.5rem;
    }

    .source-tag {
      display: inline-block;
      font-size: 0.625rem;
      padding: 0.25rem 0.5rem;
      background: rgba(139, 92, 246, 0.2);
      color: var(--synk-purple);
      border-radius: 9999px;
      margin-right: 0.25rem;
    }

    .input-area {
      padding: 1rem 1.5rem;
      background: var(--white-10);
      border-top: 1px solid var(--white-10);
    }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .quick-reply {
      font-size: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: var(--white-10);
      border: 1px solid var(--white-10);
      border-radius: 9999px;
      color: var(--white-50);
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-reply:hover {
      border-color: var(--synk-green);
      color: var(--synk-green);
    }

    .input-form {
      display: flex;
      gap: 0.75rem;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    #messageInput {
      width: 100%;
      padding: 0.875rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--white-10);
      border-radius: 0.75rem;
      color: #fff;
      font-size: 0.9375rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    #messageInput::placeholder {
      color: rgba(255,255,255,0.4);
    }

    #messageInput:focus {
      outline: none;
      border-color: var(--synk-green);
    }

    #messageInput:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .send-btn {
      padding: 0.875rem;
      background: linear-gradient(135deg, var(--synk-green), var(--synk-cyan));
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .send-btn:hover:not(:disabled) {
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: var(--synk-dark);
    }

    .input-hint {
      text-align: center;
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
    }

    .lead-form {
      padding: 1.5rem;
      background: linear-gradient(to top, rgba(0,255,136,0.1), transparent);
      border-top: 1px solid rgba(0,255,136,0.2);
    }

    .lead-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .lead-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--synk-green);
    }

    .lead-close {
      background: none;
      border: none;
      color: var(--white-50);
      cursor: pointer;
      padding: 0.25rem;
    }

    .lead-close:hover {
      color: #fff;
    }

    .lead-form form {
      display: grid;
      gap: 1rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 0.375rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.625rem 0.75rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--white-10);
      border-radius: 0.5rem;
      color: #fff;
      font-size: 0.875rem;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--synk-green);
    }

    .lead-submit {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, var(--synk-green), var(--synk-cyan));
      border: none;
      border-radius: 0.75rem;
      color: var(--synk-dark);
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lead-submit:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .lead-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .footer {
      text-align: center;
      padding: 1rem;
      color: var(--white-40);
      font-size: 0.875rem;
    }

    .footer-tagline {
      margin-bottom: 0.25rem;
    }

    .footer-sub {
      font-size: 0.75rem;
    }

    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-track {
      background: var(--white-10);
      border-radius: 3px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(0, 255, 136, 0.3);
      border-radius: 3px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <div class="logo-text">
          <h1>SynkBot</h1>
          <p>Asistente Virtual</p>
        </div>
      </div>
      <div class="status-badge">
        <span class="status-dot"></span>
        <span class="status-text">En línea</span>
      </div>
    </div>
  </header>

  <main>
    <div class="chat-container">
      <div class="messages" id="messages"></div>

      <div class="lead-form hidden" id="leadForm">
        <div class="lead-header">
          <span class="lead-title">📅 ¡Agendemos una llamada!</span>
          <button class="lead-close" onclick="closeLeadForm()">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <form onsubmit="submitLead(event)">
          <div class="form-row">
            <div class="form-group">
              <label>Nombre *</label>
              <input type="text" name="nombre" required placeholder="Tu nombre">
            </div>
            <div class="form-group">
              <label>Empresa</label>
              <input type="text" name="empresa" placeholder="Nombre de tu empresa">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Email *</label>
              <input type="email" name="email" required placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
              <label>Teléfono</label>
              <input type="tel" name="telefono" placeholder="+52 990 000 0000">
            </div>
          </div>
          <div class="form-group">
            <label>¿Qué servicio te interesa?</label>
            <select name="interes">
              <option value="Consulta general">Consulta general</option>
              <option value="VentasPro">VentasPro - CRM y ventas</option>
              <option value="Laboratorio IMSS-Intel">Laboratorio IMSS-Intel</option>
              <option value="DevOps y Migraciones">DevOps y Migraciones</option>
              <option value="Desarrollo de Apps/APIs">Desarrollo de Apps/APIs</option>
              <option value="Agentes de IA">Agentes de IA</option>
            </select>
          </div>
          <button type="submit" class="lead-submit" id="leadSubmit">Solicitar contacto →</button>
        </form>
      </div>

      <div class="input-area">
        <div class="quick-replies" id="quickReplies">
          <button class="quick-reply" onclick="sendQuick('¿Qué es VentasPro?')">¿Qué es VentasPro?</button>
          <button class="quick-reply" onclick="sendQuick('¿Cuánto cuesta un MVP?')">¿Cuánto cuesta un MVP?</button>
          <button class="quick-reply" onclick="sendQuick('Quiero agendar una llamada')">Quiero agendar una llamada</button>
        </div>
        <form class="input-form" onsubmit="sendMessage(event)">
          <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Escribe tu mensaje..." autocomplete="off">
          </div>
          <button type="submit" class="send-btn" id="sendBtn">
            <svg viewBox="0 0 24 24"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
          </button>
        </form>
        <p class="input-hint">SynkBot puede cometer errores. Verifica información importante.</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p class="footer-tagline">SynkData • Código a Medida. Inteligencia en cada Dato.</p>
    <p class="footer-sub">Respuesta típica en menos de 24 horas para solicitudes de contacto</p>
  </footer>

  <script>
    const API_URL = 'https://api.synkdata.online/api/v1';
    let sessionId = null;
    let isTyping = false;
    let leadFormVisible = false;

    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        addMessage('assistant', `¡Hola! 👋 Soy SynkBot, el asistente virtual de SynkData. Estoy aquí para ayudarte a encontrar la solución perfecta para tu negocio.

¿Sobre qué te gustaría hablar? Puedo ayudarte con:

• ⚡ **VentasPro** - Sistema de gestión de ventas y CRM
• 🏥 **Laboratorio IMSS-Intel** - Integraciones gubernamentales
• 🚀 **DevOps** - Migraciones y optimizaciones de infraestructura
• 💬 **Agentes de IA** - Asistentes virtuales para tu negocio
• 📱 **Desarrollo de apps y APIs**

¡Cuéntame qué necesitas!`);
      }, 800);
      document.getElementById('messageInput').focus();
    });

    function addMessage(role, content, sources = null) {
      const messagesDiv = document.getElementById('messages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      const parsedContent = content.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>');
      messageDiv.innerHTML = `
        <div class="message-text">${parsedContent}</div>
        ${sources && sources.length > 0 ? `
          <div class="sources">
            <div class="sources-label">Fuentes consultadas:</div>
            ${sources.map(s => `<span class="source-tag">📄 ${s}</span>`).join('')}
          </div>
        ` : ''}
        ${role === 'assistant' ? '<div class="message-meta"><span>SynkBot</span><span>•</span><span>Ahora</span></div>' : ''}
      `;
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTyping() {
      const messagesDiv = document.getElementById('messages');
      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing';
      typingDiv.id = 'typingIndicator';
      typingDiv.innerHTML = `
        <div class="typing-dots"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>
        <span class="typing-text">SynkBot está escribiendo...</span>
      `;
      messagesDiv.appendChild(typingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function hideTyping() {
      const typing = document.getElementById('typingIndicator');
      if (typing) typing.remove();
    }

    async function sendMessage(e) {
      e.preventDefault();
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || isTyping) return;
      addMessage('user', text);
      input.value = '';
      document.getElementById('quickReplies').style.display = 'none';
      isTyping = true;
      showTyping();
      try {
        const response = await fetch(`${API_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: sessionId })
        });
        const data = await response.json();
        hideTyping();
        if (response.ok) {
          if (data.session_id) sessionId = data.session_id;
          addMessage('assistant', data.response, data.sources);
          const lowerText = text.toLowerCase();
          if (lowerText.includes('agendar') || lowerText.includes('llamada') ||
              lowerText.includes('contacto') || lowerText.includes('hablar') ||
              lowerText.includes('servicio')) {
            setTimeout(() => showLeadForm(), 1000);
          }
        } else {
          addMessage('assistant', 'Ups, algo salió mal 😅. ¿Podrías intentar de nuevo?');
        }
      } catch (error) {
        hideTyping();
        addMessage('assistant', 'Ups, algo salió mal 😅. ¿Podrías intentar de nuevo?');
      }
      isTyping = false;
    }

    function sendQuick(text) {
      document.getElementById('messageInput').value = text;
      sendMessage({ preventDefault: () => {} });
    }

    function showLeadForm() {
      if (leadFormVisible) return;
      leadFormVisible = true;
      document.getElementById('leadForm').classList.remove('hidden');
      document.getElementById('quickReplies').style.display = 'none';
    }

    function closeLeadForm() {
      leadFormVisible = false;
      document.getElementById('leadForm').classList.add('hidden');
    }

    async function submitLead(e) {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);
      const data = Object.fromEntries(formData);
      const submitBtn = document.getElementById('leadSubmit');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Enviando...';
      try {
        const response = await fetch(`${API_URL}/lead`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (response.ok) {
          closeLeadForm();
          addMessage('assistant', `¡Perfecto, ${data.nombre}! 🎉 He recibido tu información. Uno de nuestros expertos se pondrá en contacto contigo en las próximas 24 horas.

Si necesitas algo más, aquí estaré. ¡Que tengas un excelente día! 👋`);
        } else {
          alert('Algo salió mal. Por favor intenta de nuevo.');
        }
      } catch (error) {
        alert('Error de conexión. Por favor intenta de nuevo.');
      }
      submitBtn.disabled = false;
      submitBtn.textContent = 'Solicitar contacto →';
    }
  </script>
</body>
</html>
