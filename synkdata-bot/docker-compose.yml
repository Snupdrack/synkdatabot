version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - ALLOWED_ORIGINS=http://localhost:3000,https://synkdata.online,https://synkbot.synkdata.online
    volumes:
      - chroma_data:/app/chroma_data
      - conversations:/app/conversations
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=/api/v1

volumes:
  chroma_data:
  conversations: